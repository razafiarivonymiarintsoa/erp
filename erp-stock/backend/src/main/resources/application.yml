server:
  port: 8080
  servlet:
    context-path: /api

spring:
  application:
    name: erp-stock

  datasource:
    url: jdbc:h2:mem:erp_stock;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

logging:
  level:
    com.erp.stock: DEBUG
    org.springframework.security: INFO
